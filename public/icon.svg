    <path d="M538 642h214" stroke="#e879f9" stroke-linecap="square" stroke-width="74"/>
  </g>

  <path
    d="M176 832h672"
    stroke="#22d3ee"
    stroke-opacity="0.72"
    stroke-linecap="square"
    stroke-width="16"
  />
