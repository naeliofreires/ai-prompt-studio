<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Promptizer terminal icon</title>
  <desc id="desc">A dark terminal window with cyan neon borders, prompt chevron, and cursor.</desc>
  <defs>
    <linearGradient id="frame" x1="146" x2="878" y1="146" y2="878" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.58" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="62%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.26"/>
      <stop offset="0.58" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#05070d"/>
  <path
    d="M144 144h736v736H144z"
    fill="#05070d"
    stroke="#22d3ee"
    stroke-opacity="0.16"
