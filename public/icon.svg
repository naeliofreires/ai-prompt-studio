  />
  <rect x="112" y="112" width="800" height="800" fill="#05070d" stroke="url(#frame)" stroke-width="20"/>
  <rect x="134" y="134" width="756" height="756" fill="url(#glow)"/>

  <g opacity="0.28">
    <path d="M208 248h608M208 336h608M208 424h608M208 512h608M208 600h608M208 688h608M208 776h608" stroke="#67e8f9" stroke-width="4"/>
    <path d="M248 208v608M336 208v608M424 208v608M512 208v608M600 208v608M688 208v608M776 208v608" stroke="#67e8f9" stroke-width="4"/>
  </g>

  <path d="M112 284h800" stroke="#22d3ee" stroke-opacity="0.42" stroke-width="12"/>
  <g fill="#22d3ee">
    <rect x="184" y="192" width="40" height="40"/>
    <rect x="256" y="192" width="40" height="40" opacity="0.72"/>
    <rect x="328" y="192" width="40" height="40" opacity="0.44"/>
  </g>
  <path d="M664 212h168" stroke="#e879f9" stroke-opacity="0.68" stroke-width="18"/>

  <g filter="url(#softGlow)">
    <path
